<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>EPSA Dessie Branch - Login</title>
    <link rel="stylesheet" href="x.css">
</head>
<body class="login-container">
    <div class="login-form">
        <h1 style="color: #006400; margin-bottom: 10px;">EPSA Dessie Branch</h1>
        <p style="color: #666; margin-bottom: 30px; text-align: center;">Pharmaceutical Supply Service</p>
        <form action="dashboard.html">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Confirm password" required>
            </div>
            
            
            <div class="gender-group">
                    <label>Sex</label>
                    <div class="gender-options">
                        <div class="gender-option">
                            <input type="radio" id="male" name="sex" value="male" required>
                            <label for="male">Male</label>
                        </div>
                        <div class="gender-option">
                            <input type="radio" id="female" name="sex" value="female" required>
                            <label for="female">Female</label>
                        </div>
                    </div>
                </div>
            
            
            <button type="submit" class="login-btn">🚀 Login to epsa Dashboard</button>
        </form>
        <p style="text-align: center; margin-top: 20px; color: #666;">New user? Contact administrator.</p>
    </div>
    
 
</body>
</html>
