<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Group Members · Interactive Cards</title>
  <!-- Font Awesome Icons (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
      padding: 2.5rem 2rem 3rem;
      box-shadow: 0 25px 45px -10px rgba(0, 20, 30, 0.25),
                  inset 0 1px 2px rgba(255, 255, 255, 0.7);
      transition: all 0.2s ease;
    }

    /* header with back button */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.8rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px dashed rgba(52, 73, 94, 0.15);
      gap: 0.8rem 1.2rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* back link styled as button */
    .back-link {
      background: rgba(30, 43, 55, 0.08);
      border: none;
      padding: 0.55rem 1.2rem 0.55rem 1rem;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      color: #1e2b37;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      text-decoration: none; /* remove underline */
    }

    .back-link i {
      font-size: 1.1rem;
      color: #2d6a8f;
      transition: transform 0.2s;
    }

    .back-link:hover {
      background: rgba(45, 106, 143, 0.12);
      border-color: rgba(45, 106, 143, 0.15);
      transform: translateX(-2px);
      box-shadow: 0 6px 12px rgba(0, 20, 30, 0.06);
      text-decoration: none;
    }

    .back-link:hover i {
      transform: translateX(-3px);
    }

    .back-link:active {
      transform: scale(0.94);
    }

    .header h1 {
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #1e2b37;
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .header h1 i {
      color: #2d6a8f;
      font-size: 2rem;
      background: rgba(45, 106, 143, 0.12);
      padding: 0.4rem 0.6rem;
      border-radius: 2rem;
    }

    .member-count {
      background: #1e2b37;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 1rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .member-count i {
      font-size: 1.1rem;
    }

    /* grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-top: 0.5rem;
    }

    /* card */
    .member-card {
      background: #ffffff;
      border-radius: 2.2rem 1.8rem 2.2rem 1.8rem;
      padding: 1.8rem 1.2rem 1.5rem;
      box-shadow: 0 12px 28px -8px rgba(0, 20, 30, 0.12), 
                  0 4px 12px rgba(0, 0, 0, 0.02);
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .member-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #2d6a8f, #6a9ec4, #2d6a8f);
      opacity: 0.4;
    }

    .member-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 40px -12px rgba(18, 52, 77, 0.25);
      border-color: rgba(45, 106, 143, 0.2);
    }

    .member-card:active {
      transform: scale(0.97);
      transition-duration: 0.08s;
    }

    .card-avatar {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .avatar-icon {
      background: #eef5fa;
      width: 56px;
      height: 56px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e3b4f;
      font-size: 1.8rem;
      font-weight: 500;
      box-shadow: inset 0 0 0 1px rgba(45, 106, 143, 0.15);
      flex-shrink: 0;
      transition: 0.2s;
    }

    .member-card:hover .avatar-icon {
      background: #dce9f2;
      box-shadow: inset 0 0 0 2px #2d6a8f55;
    }

    .member-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: #13212b;
      letter-spacing: -0.2px;
      line-height: 1.3;
      word-break: break-word;
    }

    .member-name i {
      font-size: 0.9rem;
      color: #5a7e96;
      margin-left: 4px;
      opacity: 0.7;
    }

    .id-wrapper {
      margin-top: 0.2rem;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.4rem 0.6rem;
      background: #f2f7fc;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(0,0,0,0.02);
      transition: 0.15s;
    }

    .id-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #3d627a;
      font-weight: 600;
      background: #dbe6ef;
      padding: 0.15rem 0.6rem;
      border-radius: 40px;
    }

    .id-number {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      font-weight: 550;
      color: #0d2c3f;
      letter-spacing: 0.5px;
      background: white;
      padding: 0.15rem 0.8rem;
      border-radius: 40px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
      border: 1px solid #eef4f9;
      word-break: break-word;
    }

    .card-footer {
      margin-top: 1.4rem;
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      padding-top: 0.9rem;
      font-size: 0.9rem;
      color: #2d5b77;
    }

    .card-footer i {
      opacity: 0.5;
      font-size: 0.8rem;
      margin-right: 6px;
    }

    .member-card.highlight {
      background: #f3faff;
      border: 1px solid #6a9ec4;
      box-shadow: 0 0 0 3px rgba(45, 106, 143, 0.15);
    }

    /* click hint */
    .click-hint {
      text-align: center;
      margin-top: 2.2rem;
      font-size: 0.85rem;
      color: #4c6f88;
      opacity: 0.7;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .click-hint i {
      margin-right: 4px;
    }

    .click-hint span {
      background: rgba(45, 106, 143, 0.08);
      padding: 0.2rem 1rem;
      border-radius: 50px;
    }

    /* responsive */
    @media (max-width: 600px) {
      .container {
        padding: 1.8rem 1.2rem 2rem;
        border-radius: 2rem;
      }
      .header h1 {
        font-size: 1.7rem;
      }
      .member-count {
        padding: 0.4rem 1rem;
        font-size: 0.85rem;
      }
      .card-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .member-card {
        padding: 1.4rem 1rem;
      }
      .member-name {
        font-size: 1rem;
      }
      .id-number {
        font-size: 0.9rem;
        padding: 0.1rem 0.5rem;
      }
      .back-link {
        font-size: 0.9rem;
        padding: 0.4rem 1rem 0.4rem 0.8rem;
      }
      .header-left {
        gap: 0.6rem;
      }
    }

    @media (max-width: 450px) {
      .card-grid {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .member-count {
        align-self: flex-start;
      }
      .header-left {
        justify-content: space-between;
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- ===== MEMBERS SECTION ===== -->
  <div id="membersSection">
    <div class="header">
      <div class="header-left">
        <!-- BACK LINK: navigates to home.html -->
        <a href="home.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Back
        </a>
        <h1>
          <i class="fas fa-users"></i> 
          Group members
        </h1>
      </div>
      <div class="member-count">
        <i class="fas fa-user-check"></i> 
        6 members
      </div>
    </div>

    <!-- grid -->
    <div id="memberGrid" class="card-grid"></div>

    <div class="click-hint">
      <span><i class="fas fa-mouse-pointer"></i> click any card</span>
      <span><i class="fas fa-arrow-right"></i> highlight effect</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- MEMBER DATA ----------
    const members = [
      { name: "Solomon Alemu", id: "2302/13" },
      { name: "Yeshi Geremew", id: "3923/16" },
      { name: "Nebat Abebe", id: "1527/16" },
      { name: "Zemen Belayneh", id: "2171/16" },
      { name: "Oumer Mohamed", id: "1587/16" },
      { name: "Amlaku Getawey", id: "0242/16" }
    ];

    // DOM refs
    const grid = document.getElementById('memberGrid');

    // ----- helper: get initials -----
    function getInitials(fullName) {
      if (!fullName) return '?';
      const parts = fullName.trim().split(/\s+/);
      if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
      const first = parts[0].charAt(0).toUpperCase();
      const last = parts[parts.length - 1].charAt(0).toUpperCase();
      return first + last;
    }

    // ----- render cards -----
    function renderCards() {
      grid.innerHTML = ''; 
      members.forEach((member, index) => {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.dataset.index = index;
        card.dataset.name = member.name;

        const initials = getInitials(member.name);

        card.innerHTML = `
          <div class="card-avatar">
            <div class="avatar-icon" aria-hidden="true">${initials}</div>
            <div class="member-name">${member.name} <i class="fas fa-id-badge"></i></div>
          </div>
          <div class="id-wrapper">
            <span class="id-label"><i class="far fa-id-card"></i> ID</span>
            <span class="id-number">${member.id}</span>
          </div>
          <div class="card-footer">
            <i class="fas fa-chevron-circle-right"></i> 
            <span>#${index + 1}</span>
          </div>
        `;

        // click highlight
        card.addEventListener('click', function(e) {
          e.stopPropagation();
          document.querySelectorAll('.member-card').forEach(c => c.classList.remove('highlight'));
          this.classList.add('highlight');
          if (navigator.vibrate) navigator.vibrate(10);
        });

        grid.appendChild(card);
      });
    }

    // click outside cards -> remove highlight
    document.addEventListener('click', function(e) {
      const card = e.target.closest('.member-card');
      if (!card) {
        document.querySelectorAll('.member-card').forEach(c => c.classList.remove('highlight'));
      }
    });

    // escape key: remove highlight
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.member-card').forEach(c => c.classList.remove('highlight'));
      }
    });

    // ----- init -----
    renderCards();
    console.log('✨ Group members interactive with <a href="home.html">Back</a> link.');
  })();
</script>

</body>
</html>
